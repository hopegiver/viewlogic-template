<!-- src/views/{folder}/{page-name}.html -->
<!-- 페이지 HTML 템플릿 -->

<div class="container py-4">
    <!-- 페이지 헤더 -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">페이지 제목</h2>
        <button class="btn btn-primary" @click="handleAction">
            액션 버튼
        </button>
    </div>

    <!-- 로딩 상태 -->
    <div v-if="loading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- 데이터 목록 -->
    <div v-else>
        <!-- 빈 상태 -->
        <div v-if="items.length === 0" class="text-center py-5 text-secondary">
            <p class="mb-0">데이터가 없습니다.</p>
        </div>

        <!-- 카드 그리드 예시 -->
        <div class="row g-3">
            <div v-for="item in items" :key="item.id" class="col-12 col-md-6 col-xl-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">{{ item.title }}</h5>
                        <p class="card-text text-secondary">{{ item.description }}</p>
                    </div>
                    <div class="card-footer bg-transparent">
                        <button class="btn btn-sm btn-outline-primary"
                                @click="navigateTo('/detail', { id: item.id })">
                            상세보기
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
